<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric/Imperial Unit Conversion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Purple Header Section -->
        <div class="header">
            <h1>Metric/Imperial Unit Conversion</h1>
            <div class="input-section">
                <input 
                    type="number" 
                    id="numberInput" 
                    class="number-input" 
                    placeholder="Enter number"
                    value="20"
                >
                <button id="convertBtn" class="convert-btn">Convert</button>
            </div>
        </div>

        <!-- Dark Results Section -->
        <div class="results-section">
            <!-- Length Conversion -->
            <div class="conversion-box">
                <h2>Length (Meter/Feet)</h2>
                <p id="lengthResult">Enter a number and click Convert</p>
            </div>

            <!-- Volume Conversion -->
            <div class="conversion-box">
                <h2>Volume (Liters/Gallons)</h2>
                <p id="volumeResult">Enter a number and click Convert</p>
            </div>

            <!-- Mass Conversion -->
            <div class="conversion-box">
                <h2>Mass (Kilograms/Pounds)</h2>
                <p id="massResult">Enter a number and click Convert</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
